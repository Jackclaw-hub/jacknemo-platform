<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Radar — Startup Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="back">← Back</a>
      <span class="logo-icon" style="font-size:1.25rem;color:var(--accent)">◎</span>
      <h1>Founder Radar</h1>
    </header>

    <!-- Profile -->
    <section class="profile-card">
      <h2>Your Profile</h2>
      <div class="profile-grid">
        <div class="field">
          <label for="stage">Stage</label>
          <select id="stage">
            <option value="idea">Idea</option>
            <option value="mvp" selected>MVP</option>
            <option value="early-revenue">Early Revenue</option>
            <option value="growth">Growth</option>
          </select>
        </div>
        <div class="field">
          <label for="sector">Sector</label>
          <select id="sector">
            <option value="">All sectors</option>
            <option value="saas">SaaS</option>
            <option value="tech">Tech</option>
            <option value="health">Health</option>
            <option value="climate">Climate</option>
            <option value="hardware">Hardware</option>
            <option value="b2b">B2B</option>
            <option value="agritech">AgriTech</option>
            <option value="creative">Creative</option>
            <option value="media">Media</option>
          </select>
        </div>
        <div class="field">
          <label for="region">Region</label>
          <select id="region">
            <option value="">Anywhere</option>
            <option value="EU">EU</option>
            <option value="DE">Germany</option>
            <option value="Berlin">Berlin</option>
            <option value="NL">Netherlands</option>
          </select>
        </div>
        <div class="field field--checkbox">
          <input type="checkbox" id="remote-only" />
          <label for="remote-only">Remote-only listings</label>
        </div>
      </div>
    </section>

    <!-- Radar Results -->
    <section class="radar-section" id="radar-section">
      <h2>Your Radar <span id="result-count" style="color:var(--text-muted);font-weight:400;font-size:.9rem"></span></h2>
      <div class="radar-list" id="radar-list">
        <div class="empty-state">Loading radar…</div>
      </div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/founder.js"></script>
</body>
</html>
