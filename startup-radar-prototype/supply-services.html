<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Service — Startup Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="back">← Back</a>
      <span class="logo-icon" style="font-size:1.25rem;color:var(--green)">◎</span>
      <h1>Register a Service Offer</h1>
    </header>

    <!-- Listing Form -->
    <section class="supply-form">
      <h2>New Service Offer</h2>
      <div class="form-grid">
        <div class="field">
          <label for="sv-title">Service title</label>
          <input type="text" id="sv-title" placeholder="e.g. Brand Identity Sprint — 5 Days" />
        </div>
        <div class="field">
          <label for="sv-provider">Provider name</label>
          <input type="text" id="sv-provider" placeholder="Feldform Studio" />
        </div>
        <div class="field">
          <label for="sv-price">Starting price (€)</label>
          <input type="number" id="sv-price" placeholder="0 = free / negotiable" min="0" />
        </div>
        <div class="field">
          <label for="sv-geo">Delivery</label>
          <select id="sv-geo">
            <option value="remote">Remote / Online</option>
            <option value="regional">On-site / Regional</option>
          </select>
        </div>
        <div class="field field--checkbox">
          <input type="checkbox" id="sv-starter" checked />
          <label for="sv-starter">Starter-friendly (early-stage pricing)</label>
        </div>
        <div class="field field--full">
          <label for="sv-summary">Description</label>
          <textarea id="sv-summary" placeholder="What's included, deliverables, timeline…"></textarea>
        </div>
        <div class="field field--full">
          <label>Best for (stages)</label>
          <div class="tag-picker" id="sv-stages"></div>
        </div>
        <div class="field field--full">
          <label>Sectors (leave blank for all)</label>
          <div class="tag-picker" id="sv-sectors"></div>
        </div>
      </div>
      <button class="btn btn--primary" id="sv-submit">Save Offer</button>
      <span id="sv-success" style="display:none;margin-left:1rem;color:var(--green);font-size:.9rem">✓ Offer saved</span>
    </section>

    <!-- Saved listings -->
    <section class="drafts-section">
      <h2>Your Offers</h2>
      <div id="sv-drafts-list"><p style="color:var(--text-muted);font-size:.9rem">No offers yet.</p></div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/supply.js"></script>
  <script>
    initServiceForm({
      titleEl:    'sv-title',
      providerEl: 'sv-provider',
      priceEl:    'sv-price',
      geoEl:      'sv-geo',
      starterEl:  'sv-starter',
      summaryEl:  'sv-summary',
      stagesEl:   'sv-stages',
      sectorsEl:  'sv-sectors',
      submitEl:   'sv-submit',
      successEl:  'sv-success',
      draftsEl:   'sv-drafts-list',
      storageKey: 'sr_service_drafts',
    });
  </script>
</body>
</html>
