<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Startup Radar — Founder Dashboard</title>
  <style>
    body { font-family: system-ui; max-width: 900px; margin: 0 auto; padding: 20px; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #4f46e5; margin-bottom: 24px; }
    nav h1 { margin: 0; color: #4f46e5; }
    nav button { background: none; border: 1px solid #ddd; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-bar input { flex: 1; padding: 10px 14px; border: 2px solid #4f46e5; border-radius: 6px; font-size: 15px; }
    .search-bar button { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; }
    .search-bar button:hover { background: #4338ca; }
    .back-btn { display: inline-block; margin-bottom: 12px; background: none; border: 1px solid #4f46e5; color: #4f46e5; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin: 12px 0; position: relative; }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .score-badge { position: absolute; top: 16px; right: 16px; background: #4f46e5; color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; user-select: none; }
    .score-badge:hover { opacity: 0.85; }
    .score-badge.high { background: #10b981; }
    .score-badge.mid { background: #f59e0b; }
    .score-badge.low { background: #6b7280; }
    .explanation-panel { display: none; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px 16px; margin-top: 10px; }
    .explanation-panel.open { display: block; }
    .exp-item { font-size: 13px; padding: 3px 0; }
    .exp-item.match { color: #059669; }
    .exp-item.nomatch { color: #dc2626; }
    .exp-item.partial { color: #d97706; }
    .tag { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
    .type-badge { display: inline-block; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .contact-btn { background: #4f46e5; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 8px; }
    .contact-btn.contacted { background: #10b981; cursor: default; }
    .empty { text-align: center; color: #9ca3af; padding: 40px; }
    .spinner { text-align: center; color: #6b7280; padding: 32px; font-size: 18px; }
    .invite-section { background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 8px; padding: 20px; margin-top: 24px; }
    .invite-link { font-family: monospace; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 8px 12px; font-size: 13px; flex: 1; }
    .copy-btn { background: #4f46e5; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .early-badge { display: inline-block; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; margin-left: 8px; }
    .featured-card { border: 2px solid #f59e0b; box-shadow: 0 0 0 2px #fef3c7; }
    .featured-chip { display: inline-block; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-left: 6px; }
    #status { color: #4f46e5; margin: 8px 0; font-size: 13px; font-weight: 600; }
    .mode-label { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .star-rating { margin-top: 8px; }
    .star-rating span { font-size: 20px; cursor: pointer; color: #d1d5db; transition: color .15s; }
    .star-rating span.active, .star-rating span:hover { color: #f59e0b; }
    .save-search-btn { background: none; border: 1px solid #6b7280; color: #6b7280; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .save-search-btn:hover { border-color: #4f46e5; color: #4f46e5; }
    .saved-searches { margin-top: 8px; }
    .saved-search-chip { display: inline-block; background: #ede9fe; color: #5b21b6; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin: 2px; cursor: pointer; }
    .saved-search-chip:hover { background: #ddd6fe; }
  </style>
</head>
<body>
  <nav>
    <h1>&#x1F680; Startup Radar</h1>
    <div>
      <span id="user-name"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search listings&#8230; (equipment, services, city)" onkeydown="if(event.key==='Enter') runSearch()">
    <button onclick="runSearch()">&#x1F50D; Search</button>
  </div>

  <div id="back-wrap" style="display:none">
    <button class="back-btn" onclick="exitSearch()">&#8592; Back to Radar Results</button>
  </div>

  <div id="mode-label" class="mode-label">Radar Results</div>

  <div class="filters" id="radar-filters">
    <select id="f-stage">
      <option value="">Alle Stages</option>
      <option value="pre-seed">Pre-Seed</option>
      <option value="seed">Seed</option>
      <option value="series-a">Series A</option>
    </select>
    <select id="f-geo">
      <option value="">Alle Regionen</option>
      <option value="local">Lokal</option>
      <option value="regional">Regional</option>
      <option value="national">National</option>
    </select>
    <input type="text" id="f-city" placeholder="Stadt..." style="width:140px">
    <button onclick="loadRadar()" style="background:#4f46e5;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer">Aktualisieren</button>
    <button class="save-search-btn" onclick="saveCurrentSearch()">&#x2665; Save Search</button>
  </div>

  <div class="saved-searches" id="saved-searches"></div>
  <div id="status"></div>
  <div id="results"><div class="empty">Lade Radar-Ergebnisse...</div></div>

  <script src="api-client.js"></script>
  <script>
    redirectIfNotLoggedIn();
    const user = auth.getUser();
    document.getElementById('user-name').textContent = user?.name || user?.email || '';

    let radarCache = null;

    function logout() { AuthAPI.logout(); location.href = 'auth.html'; }

    function scoreClass(pct) {
      if (pct >= 70) return 'high';
      if (pct >= 40) return 'mid';
      return 'low';
    }

    function toggleExplanation(id) {
      const panel = document.getElementById('exp-' + id);
      if (panel) panel.classList.toggle('open');
    }

    function expClass(item) {
      if (item.startsWith('\u2713')) return 'match';
      if (item.startsWith('\u2717')) return 'nomatch';
      return 'partial';
    }

    function renderListing(l) {
      const pct = Math.round(l.scorePercent !== undefined ? l.scorePercent : (l.score || 0) * 100);
      const contacted = localStorage.getItem('contacted_' + l.id);
      const explanations = l.explanation || [];
      const expHtml = explanations.length
        ? '<div class="explanation-panel" id="exp-' + l.id + '">' +
            explanations.map(e => '<div class="exp-item ' + expClass(e) + '">' + e + '</div>').join('') +
          '</div>'
        : '';
      return '<div class="card' + (l.is_featured ? ' featured-card' : '') + '" id="card-' + l.id + '">' +
        '<div class="score-badge ' + scoreClass(pct) + '" onclick="toggleExplanation(' + l.id + ')" title="Click for match details">' +
          pct + '% Match &#9660;' +
        '</div>' +
        '<span class="type-badge">' + (l.type || '&mdash;') + '</span>' + (l.is_featured ? '<span class="featured-chip">\u2B50 Featured</span>' : '') +
        '<h3 style="margin:8px 0 4px">' + l.title + '</h3>' +
        '<p style="margin:4px 0;color:#6b7280;font-size:13px"><strong>Geo:</strong> ' + (l.geo || '&mdash;') + ' | <strong>Stadt:</strong> ' + (l.city || '&mdash;') + '</p>' +
        '<p>' + (l.tags || []).map(t => '<span class="tag">' + t + '</span>').join('') + '</p>' +
        expHtml +
        '<button class="contact-btn ' + (contacted ? 'contacted' : '') + '" onclick="markContacted(' + l.id + ')" ' + (contacted ? 'disabled' : '') + '>' +
          (contacted ? '&#10003; Kontaktiert' : 'Kontaktieren') +
        '</button>' +
        '<div id="rating-' + l.id + '" style="display:' + (contacted ? 'block' : 'none') + '">' +
          '<p style="font-size:12px;color:#6b7280;margin:6px 0 2px">Bewerte diesen Anbieter:</p>' +
          renderStars(l.id, l.provider_id) +
        '</div></div>';
    }

    function markContacted(id, providerId) {
      localStorage.setItem('contacted_' + id, '1');
      localStorage.setItem('contacted_provider_' + id, providerId || '');
      const btn = document.querySelector('#card-' + id + ' .contact-btn');
      if (btn) { btn.textContent = '\u2713 Kontaktiert'; btn.className = 'contact-btn contacted'; btn.disabled = true; }
      // Show star rating widget
      const ratingWrap = document.getElementById('rating-' + id);
      if (ratingWrap) ratingWrap.style.display = 'block';
    }

    function renderStars(listingId, providerId) {
      const savedRating = parseInt(localStorage.getItem('rating_' + listingId)) || 0;
      let html = '<div class="star-rating" id="stars-' + listingId + '">';
      for (let i = 1; i <= 5; i++) {
        html += '<span class="' + (i <= savedRating ? 'active' : '') + '" ' +
          'onclick="submitStar(' + listingId + ',' + i + ','' + providerId + '')" ' +
          'onmouseover="hoverStars(' + listingId + ',' + i + ')" ' +
          'onmouseout="resetStars(' + listingId + ',' + savedRating + ')">&#x2605;</span>';
      }
      html += '</div>';
      return html;
    }

    function hoverStars(listingId, n) {
      const wrap = document.getElementById('stars-' + listingId);
      if (!wrap) return;
      [...wrap.querySelectorAll('span')].forEach((s, i) => {
        s.className = i < n ? 'active' : '';
      });
    }

    function resetStars(listingId, savedRating) {
      const wrap = document.getElementById('stars-' + listingId);
      if (!wrap) return;
      [...wrap.querySelectorAll('span')].forEach((s, i) => {
        s.className = i < savedRating ? 'active' : '';
      });
    }

    async function submitStar(listingId, rating, providerId) {
      localStorage.setItem('rating_' + listingId, rating);
      resetStars(listingId, rating);
      try {
        await ProvidersAPI.submitRating(providerId, rating, listingId);
      } catch(e) { /* rating failed silently */ }
    }

    async function saveCurrentSearch() {
      const filters = {};
      const stage = document.getElementById('f-stage').value;
      const geo = document.getElementById('f-geo').value;
      const city = document.getElementById('f-city').value;
      if (stage) filters.stage = stage;
      if (geo) filters.geo = geo;
      if (city) filters.city = city;
      const name = prompt('Name for this search:', 'My Search');
      if (name === null) return;
      try {
        await SavedSearchAPI.save(name || 'My Search', filters);
        loadSavedSearches();
    loadInviteSection();
      } catch(e) { alert('Could not save: ' + e.message); }
    }

    async function loadSavedSearches() {
      try {
        const data = await SavedSearchAPI.list();
        const searches = data.savedSearches || [];
        const wrap = document.getElementById('saved-searches');
        if (!searches.length) { wrap.innerHTML = ''; return; }
        wrap.innerHTML = '<span style="font-size:12px;color:#6b7280">Saved: </span>' +
          searches.map(s => `<span class="saved-search-chip" onclick="applySavedSearch(${JSON.stringify(s.filters).replace(/"/g,'&quot;')})" title="Delete: right-click" oncontextmenu="deleteSavedSearch(${s.id});return false">${s.name}</span>`).join('');
      } catch(e) {}
    }

    function applySavedSearch(filters) {
      if (filters.stage) document.getElementById('f-stage').value = filters.stage;
      if (filters.geo) document.getElementById('f-geo').value = filters.geo;
      if (filters.city) document.getElementById('f-city').value = filters.city || '';
      async function loadInviteSection() {
      if (user?.role !== 'founder') return;
      try {
        const data = await api('GET', '/founders/referral-code', null, auth.getToken());
        const code = data.code?.code;
        const stats = data.stats || {};
        if (!code) return;
        document.getElementById('invite-section').style.display = 'block';
        const baseUrl = location.origin || 'http://localhost';
        document.getElementById('invite-link').value = baseUrl + '/auth.html?ref=' + code;
        document.getElementById('invite-count').textContent = stats.uses + ' erfolgreiche Einladungen';
        if (stats.earlyAdopter) {
          document.getElementById('early-badge').innerHTML = '<span class="early-badge">&#x1F3C5; Early Adopter</span>';
        }
      } catch(e) { /* invite section optional */ }
    }

    function copyInviteLink() {
      const el = document.getElementById('invite-link');
      el.select();
      navigator.clipboard?.writeText(el.value).catch(() => document.execCommand('copy'));
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '\u2713 Kopiert!';
      setTimeout(() => { btn.textContent = '\uD83D\uDCCB Kopieren'; }, 2000);
    }

    loadRadar();
    loadSavedSearches();
    }

    async function deleteSavedSearch(id) {
      if (!confirm('Delete this saved search?')) return;
      try { await SavedSearchAPI.delete(id); loadSavedSearches(); } catch(e) {}
    }

    async function runSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      document.getElementById('back-wrap').style.display = 'block';
      document.getElementById('radar-filters').style.display = 'none';
      document.getElementById('mode-label').textContent = 'Search results for "' + q + '"';
      document.getElementById('status').textContent = '';
      document.getElementById('results').innerHTML = '<div class="spinner">&#x1F50D; Suche...</div>';
      try {
        const data = await ListingsAPI.search(q);
        const listings = data.listings || data || [];
        const el = document.getElementById('results');
        if (!listings.length) {
          el.innerHTML = '<div class="empty">No listings found for &ldquo;' + q + '&rdquo;</div>';
        } else {
          el.innerHTML = listings.map(renderListing).join('');
          document.getElementById('status').textContent = listings.length + ' result(s) found';
        }
      } catch(ex) {
        document.getElementById('results').innerHTML = '<div class="empty">Error: ' + ex.message + '</div>';
      }
    }

    function exitSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('back-wrap').style.display = 'none';
      document.getElementById('radar-filters').style.display = 'flex';
      document.getElementById('mode-label').textContent = 'Radar Results';
      document.getElementById('status').textContent = '';
      if (radarCache) {
        document.getElementById('results').innerHTML = radarCache;
      } else {
        loadRadar();
      }
    }

    async function loadRadar() {
      const params = {};
      const stage = document.getElementById('f-stage').value;
      const geo = document.getElementById('f-geo').value;
      const city = document.getElementById('f-city').value;
      if (stage) params.stage = stage;
      if (geo) params.geo = geo;
      if (city) params.city = city;
      document.getElementById('results').innerHTML = '<div class="spinner">&#x26A1; Lade Radar...</div>';
      try {
        const data = await RadarAPI.getResults(params);
        const el = document.getElementById('results');
        if (!data.listings || data.listings.length === 0) {
          el.innerHTML = '<div class="empty">Keine Matches gefunden. Passe deine Filter an.</div>';
        } else {
          el.innerHTML = data.listings.map(renderListing).join('');
          radarCache = el.innerHTML;
          document.getElementById('status').textContent = data.total + ' Matches gefunden';
        }
      } catch(ex) {
        document.getElementById('results').innerHTML = '<div class="empty">Fehler: ' + ex.message + '</div>';
      }
    }

    loadRadar();
  </script>
</body>
</html>
