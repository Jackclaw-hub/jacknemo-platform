<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Provider Profile — Startup Radar</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #4f46e5; margin-bottom: 24px; }
    nav h1 { margin: 0; color: #4f46e5; font-size: 18px; }
    .back-link { color: #4f46e5; text-decoration: none; font-size: 14px; }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; padding: 24px; background: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; background: #4f46e5; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex-shrink: 0; }
    .profile-meta h2 { margin: 0 0 6px; }
    .profile-meta p { margin: 4px 0; font-size: 14px; color: #6b7280; }
    .profile-meta a { color: #4f46e5; }
    .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 12px; color: #111827; }
    .listing-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin: 10px 0; }
    .listing-card h3 { margin: 0 0 6px; }
    .tag { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
    .type-badge { display: inline-block; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .empty { text-align: center; color: #9ca3af; padding: 32px; }
  </style>
</head>
<body>
  <nav>
    <h1>&#x1F680; Startup Radar</h1>
    <a href="javascript:history.back()" class="back-link">&#8592; Back</a>
  </nav>

  <div id="profile-wrap">
    <div class="empty">Loading provider profile...</div>
  </div>

  <div class="section-title" id="listings-title" style="display:none">Approved Listings</div>
  <div id="listings-wrap"></div>

  <script src="api-client.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');

    if (!userId) {
      document.getElementById('profile-wrap').innerHTML = '<div class="empty">No provider ID specified.</div>';
    } else {
      loadProfile(userId);
      loadListings(userId);
    }

    async function loadProfile(uid) {
      try {
        const res = await fetch('/api/providers/' + uid + '/profile');
        const data = await res.json();
        const p = data.profile;
        const wrap = document.getElementById('profile-wrap');
        if (!p) {
          wrap.innerHTML = '<div class="empty">Profile not found.</div>';
          return;
        }
        const letter = (p.company_name || '?')[0].toUpperCase();
        wrap.innerHTML = `
          <div class="profile-header">
            ${p.logo_url
              ? '<img src="' + p.logo_url + '" style="width:72px;height:72px;border-radius:50%;object-fit:cover">'
              : '<div class="avatar">' + letter + '</div>'}
            <div class="profile-meta">
              <h2>${p.company_name || 'Unknown Provider'}</h2>
              ${p.description ? '<p>' + p.description + '</p>' : ''}
              ${p.website ? '<p>&#x1F310; <a href="' + p.website + '" target="_blank" rel="noopener">' + p.website + '</a></p>' : ''}
              ${p.contact_email ? '<p>&#x2709; <a href="mailto:' + p.contact_email + '">' + p.contact_email + '</a></p>' : ''}
            </div>
          </div>`;
      } catch(ex) {
        document.getElementById('profile-wrap').innerHTML = '<div class="empty">Error: ' + ex.message + '</div>';
      }
    }

    async function loadListings(uid) {
      try {
        const res = await fetch('/api/providers/' + uid + '/listings');
        const data = await res.json();
        const listings = data.listings || [];
        const wrap = document.getElementById('listings-wrap');
        if (!listings.length) {
          document.getElementById('listings-title').style.display = 'block';
          wrap.innerHTML = '<div class="empty">No approved listings yet.</div>';
          return;
        }
        document.getElementById('listings-title').style.display = 'block';
        wrap.innerHTML = listings.map(l => `
          <div class="listing-card">
            <span class="type-badge">${l.type}</span>
            <h3>${l.title}</h3>
            <p style="margin:4px 0;font-size:13px;color:#6b7280">
              <strong>Geo:</strong> ${l.geo || '&mdash;'} | <strong>Stadt:</strong> ${l.city || '&mdash;'}
            </p>
            <div>${(l.tags||[]).map(t => '<span class="tag">' + t + '</span>').join('')}</div>
          </div>`).join('');
      } catch(ex) {
        document.getElementById('listings-wrap').innerHTML = '<div class="empty">Error loading listings: ' + ex.message + '</div>';
      }
    }
  </script>
</body>
</html>
