<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Startup Radar — Provider Dashboard</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #4f46e5; margin-bottom: 24px; }
    nav h1 { margin: 0; color: #4f46e5; }
    nav button { background: none; border: 1px solid #ddd; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
    input, select, textarea { width: 100%; padding: 10px; margin: 6px 0 14px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button.primary { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    button.primary:hover { background: #4338ca; }
    .error { color: red; margin: 6px 0; display: none; }
    .success { color: green; margin: 6px 0; display: none; }
    .listing-item { border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px; margin: 8px 0; transition: border-color .3s; }
    .listing-item.flash { border-color: #10b981; background: #f0fdf4; }
    .listing-item.flash-reject { border-color: #ef4444; background: #fef2f2; }
    .status-badge { font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-left: 6px; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .tag { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 14px 20px; border-radius: 8px; color: white; font-weight: 600; z-index: 9999; display: none; animation: fadeIn .3s; }
    .toast.show { display: block; }
    .toast.approved { background: #10b981; }
    .toast.rejected { background: #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .sse-status { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
    .profile-section { margin-top: 24px; }
    .profile-section .card { padding: 24px; }
    .form-msg { font-size: 13px; margin: 6px 0; display: none; }
    .form-msg.success { color: #059669; }
    .form-msg.error { color: #dc2626; }
    .sse-status.live { color: #10b981; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <nav>
    <h1>&#x1F680; Startup Radar</h1>
    <div><span id="user-name"></span> <button onclick="logout()">Logout</button></div>
  </nav>

  <div class="panel">
    <div>
      <div class="card">
        <h2>Inserat erstellen</h2>
        <form id="listing-form">
          <label>Titel</label>
          <input type="text" id="l-title" placeholder="z.B. 3D-Drucker verf&#xFC;gbar" required>
          <label>Typ</label>
          <select id="l-type">
            <option value="equipment">Equipment</option>
            <option value="space">Workspace / Space</option>
            <option value="service">Service</option>
          </select>
          <label>Region</label>
          <select id="l-geo">
            <option value="local">Lokal (&lt;50km)</option>
            <option value="regional">Regional (&lt;200km)</option>
            <option value="national">National</option>
          </select>
          <label>Stadt</label>
          <input type="text" id="l-city" placeholder="Berlin">
          <label>Tags (kommagetrennt)</label>
          <input type="text" id="l-tags" placeholder="3d-druck, prototyping">
          <label>Beschreibung</label>
          <textarea id="l-desc" rows="3" placeholder="Kurze Beschreibung..."></textarea>
          <div class="error" id="l-error"></div>
          <div class="success" id="l-success"></div>
          <button type="submit" class="primary">Inserat einreichen</button>
        </form>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Meine Inserate</h2>
        <div class="sse-status" id="sse-status">&#x25CB; Connecting for live updates...</div>
        <div id="my-listings"><em>Lade...</em></div>
      </div>
    </div>
  </div>

  <div class="profile-section">
    <div class="card">
      <h2>&#x1F464; Mein Profil</h2>
      <form id="profile-form">
        <label>Firmenname</label>
        <input type="text" id="p-company" placeholder="z.B. TechEquip GmbH">
        <label>Beschreibung</label>
        <textarea id="p-desc" rows="3" placeholder="Kurze Beschreibung eures Angebots..." maxlength="500"></textarea>
        <label>Website</label>
        <input type="url" id="p-website" placeholder="https://...">
        <label>Kontakt-E-Mail</label>
        <input type="email" id="p-email" placeholder="info@example.com">
        <div class="form-msg" id="p-msg"></div>
        <button type="submit" class="primary" style="margin-top:4px">Profil speichern</button>
      </form>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script>
    redirectIfNotLoggedIn();
    const user = auth.getUser();
    document.getElementById('user-name').textContent = user?.name || user?.email || '';

    function logout() { AuthAPI.logout(); location.href = 'auth.html'; }

    function showToast(message, type) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.className = 'toast show ' + type;
      setTimeout(() => { el.className = 'toast'; }, 5000);
    }

    function flashCard(listingId, type) {
      const el = document.getElementById('listing-' + listingId);
      if (!el) return;
      el.classList.add(type === 'approved' ? 'flash' : 'flash-reject');
      setTimeout(() => el.classList.remove('flash', 'flash-reject'), 3000);
    }

    function updateCardStatus(listingId, status, reason) {
      const el = document.getElementById('listing-' + listingId);
      if (!el) return;
      const badge = el.querySelector('.status-badge');
      if (badge) {
        badge.className = 'status-badge status-' + status;
        badge.textContent = status;
      }
      if (reason) {
        let reasonEl = el.querySelector('.reject-reason');
        if (!reasonEl) {
          reasonEl = document.createElement('p');
          reasonEl.className = 'reject-reason';
          reasonEl.style.cssText = 'color:#dc2626;font-size:12px;margin:4px 0';
          el.appendChild(reasonEl);
        }
        reasonEl.textContent = 'Grund: ' + reason;
      }
    }

    // SSE — real-time listing status updates
    function connectSSE() {
      const token = auth.getToken ? auth.getToken() : localStorage.getItem('token');
      if (!token) return;

      // Use fetch-based approach since EventSource doesn't support headers
      // Instead, pass token as query param (safe for SSE)
      const url = '/api/listings/events?token=' + encodeURIComponent(token);
      const es = new EventSource(url);

      es.addEventListener('connected', () => {
        document.getElementById('sse-status').textContent = '&#x25CF; Live updates active';
        document.getElementById('sse-status').className = 'sse-status live';
      });

      es.addEventListener('listing_approved', (e) => {
        const data = JSON.parse(e.data);
        showToast('&#x2713; "' + data.title + '" wurde genehmigt!', 'approved');
        flashCard(data.listingId, 'approved');
        updateCardStatus(data.listingId, 'approved');
      });

      es.addEventListener('listing_rejected', (e) => {
        const data = JSON.parse(e.data);
        showToast('&#x2717; "' + data.title + '" wurde abgelehnt.', 'rejected');
        flashCard(data.listingId, 'rejected');
        updateCardStatus(data.listingId, 'rejected', data.reason);
      });

      es.onerror = () => {
        document.getElementById('sse-status').textContent = '&#x25CB; Reconnecting...';
        document.getElementById('sse-status').className = 'sse-status';
        es.close();
        setTimeout(connectSSE, 5000);
      };
    }

    async function loadMyListings() {
      try {
        const data = await ListingsAPI.getAll();
        const el = document.getElementById('my-listings');
        if (!data.listings?.length) { el.innerHTML = '<em>Noch keine Inserate.</em>'; return; }
        el.innerHTML = data.listings.map(l => `
          <div class="listing-item" id="listing-${l.id}">
            <strong>${l.title}</strong>
            <span class="status-badge status-${l.status}">${l.status}</span>
            <p style="margin:4px 0;font-size:13px">${l.type} &middot; ${l.geo} &middot; ${l.city || ''}</p>
            <div>${(l.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `).join('');
      } catch(ex) {
        document.getElementById('my-listings').innerHTML = '<em>Fehler: ' + ex.message + '</em>';
      }
    }

    document.getElementById('listing-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('l-error');
      const ok = document.getElementById('l-success');
      err.style.display = 'none'; ok.style.display = 'none';
      const tags = document.getElementById('l-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      try {
        await ListingsAPI.create({
          title: document.getElementById('l-title').value,
          type: document.getElementById('l-type').value,
          geo: document.getElementById('l-geo').value,
          city: document.getElementById('l-city').value,
          tags,
          description: document.getElementById('l-desc').value,
        });
        ok.style.display = 'block';
        ok.textContent = 'Inserat eingereicht! Wird nach Pr&#xFC;fung freigeschaltet.';
        e.target.reset();
        // Load saved provider profile
    async function loadProviderProfile() {
      try {
        const data = await api('GET', '/providers/profile', null, auth.getToken());
        const p = data.profile;
        if (p) {
          document.getElementById('p-company').value = p.company_name || '';
          document.getElementById('p-desc').value = p.description || '';
          document.getElementById('p-website').value = p.website || '';
          document.getElementById('p-email').value = p.contact_email || '';
        }
      } catch(e) { /* profile may not exist yet */ }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('p-msg');
      msg.style.display = 'none';
      try {
        await api('POST', '/providers/profile', {
          company_name: document.getElementById('p-company').value,
          description: document.getElementById('p-desc').value,
          website: document.getElementById('p-website').value,
          contact_email: document.getElementById('p-email').value,
        }, auth.getToken());
        msg.className = 'form-msg success';
        msg.textContent = '&#x2713; Profil gespeichert';
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
      } catch(ex) {
        msg.className = 'form-msg error';
        msg.textContent = 'Fehler: ' + ex.message;
        msg.style.display = 'block';
      }
    });

    loadMyListings();
    loadProviderProfile();
      } catch(ex) {
        err.style.display = 'block';
        err.textContent = ex.message;
      }
    });

    loadMyListings();
    connectSSE();
  </script>
</body>
</html>
