name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-1234567890' }}
          NODE_ENV: test
      - name: Smoke test
        run: |
          node src/app.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3000/health || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: |
          for f in src/app.js src/server.js; do
            node --check $f && echo "$f OK"
          done

  deploy:
    name: Deploy to Pod
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            docker exec openshell-cluster-nemoclaw kubectl exec -n openshell pod/jacknemo -- sh -c \
              'cd /sandbox/.openclaw-data/workspace/jacknemo-platform && git fetch origin main && git reset --hard origin/main'
            docker exec openshell-cluster-nemoclaw kubectl exec -n openshell pod/jacknemo -- sh -c \
              'setsid /tmp/start-backend.sh </dev/null >/dev/null 2>&1 & sleep 3 && curl -sf http://localhost:3000/health'
            echo "Deploy OK at $(date)"
